<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Egyptian Y-DNA Project</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@800&family=Inter:wght@400;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { "primary": "#001736", "secondary": "#775a19", "background": "#f8f9fa" } } }
        }
    </script>
    <style>
        #detail-modal, #login-modal { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(0, 23, 54, 0.6); backdrop-filter: blur(15px); align-items: center; justify-content: center; }
        #detail-modal.active, #login-modal.active { display: flex; }
        .stat-card { transition: all 0.3s ease; border: 1px solid #eef0f2; cursor: pointer; background: white; padding: 1.5rem; border-radius: 2.5rem; display: flex; align-items: center; gap: 1.25rem; }
        .stat-card:hover { border-color: #001736; transform: translateY(-5px); }
    </style>
</head>
<body class="bg-background text-primary font-body antialiased">

    <!-- LOGIN MODAL -->
    <div id="login-modal">
        <div class="bg-white p-8 rounded-[2rem] shadow-2xl max-w-sm w-full text-center">
            <h2 class="text-2xl font-black mb-4 uppercase">Admin Access</h2>
            <input type="password" id="admin-pw" class="w-full p-4 rounded-xl border mb-4 text-center font-bold" placeholder="Password">
            <div class="flex gap-3">
                <button onclick="closeLogin()" class="flex-1 p-3 rounded-xl bg-gray-100 font-bold">Cancel</button>
                <button onclick="tryLogin()" class="flex-1 p-3 rounded-xl bg-primary text-white font-bold">Login</button>
            </div>
        </div>
    </div>

    <!-- DETAIL MODAL -->
    <div id="detail-modal" onclick="closeModal(event)">
        <div class="bg-white w-full max-w-4xl rounded-[3rem] shadow-2xl p-10 relative" onclick="event.stopPropagation()">
            <button onclick="closeModal(null)" class="absolute top-8 right-8 text-gray-400"><span class="material-symbols-outlined">close</span></button>
            <div class="flex flex-col md:flex-row gap-12 items-center">
                <div class="w-[320px] h-[320px]"><canvas id="modalChartCanvas"></canvas></div>
                <div class="flex-1">
                    <h2 id="modal-title" class="text-5xl font-black uppercase">Governorate</h2>
                    <p id="modal-sample" class="text-2xl font-black text-secondary mt-2">TOTAL: 0</p>
                    <div id="modal-legend" class="space-y-2 mt-8 overflow-y-auto max-h-[300px]"></div>
                </div>
            </div>
        </div>
    </div>

    <nav class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-xl border-b h-20 flex justify-between items-center px-6">
        <div><h1 class="text-xl font-black uppercase leading-none">Egyptian Y-DNA Project</h1></div>
        <button onclick="handleAdminBtnClick()" id="admin-btn" class="bg-primary text-white px-5 py-2 rounded-xl text-xs font-bold">Admin Login</button>
    </nav>

    <main class="pt-28 pb-20 px-6 max-w-screen-2xl mx-auto space-y-16">
        <section class="grid grid-cols-1 lg:grid-cols-12 gap-12 items-center bg-white p-10 rounded-[4rem] shadow-xl">
            <div class="lg:col-span-5">
                <h2 class="text-6xl font-black tracking-tighter mb-8">National Summary</h2>
                <div class="grid grid-cols-2 gap-8 border-t pt-8">
                    <div><p class="text-[11px] font-bold text-gray-400 uppercase">Total Samples</p><p id="total-national-samples" class="text-5xl font-black">0</p></div>
                    <div><p class="text-[11px] font-bold text-gray-400 uppercase">Mapped Regions</p><p id="total-gov-count" class="text-5xl font-black">0</p></div>
                </div>
            </div>
            <div class="lg:col-span-7 flex flex-col md:flex-row items-center gap-12 justify-center lg:justify-end">
                <div class="w-[300px] h-[300px]"><canvas id="nationalChartCanvas"></canvas></div>
                <div id="national-legend" class="space-y-1 w-full max-w-[200px]"></div>
            </div>
        </section>

        <section class="space-y-8">
            <h2 class="text-5xl font-black uppercase">Published Database</h2>
            <input type="text" id="dbSearch" oninput="renderDatabase()" placeholder="Search..." class="w-full md:w-96 p-4 rounded-2xl shadow-lg border-none bg-white font-bold">
            <div class="bg-white rounded-[3rem] shadow-2xl overflow-hidden overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-primary text-white text-[10px] uppercase">
                        <tr><th class="px-8 py-6">Y-DNA</th><th class="px-6 py-6">mtDNA</th><th class="px-6 py-6">Governorate</th><th class="px-6 py-6">Name</th><th class="px-6 py-6">Kit</th><th class="px-8 py-6 text-right">Links</th></tr>
                    </thead>
                    <tbody id="database-body" class="text-sm font-bold divide-y divide-gray-50"></tbody>
                </table>
            </div>
        </section>

        <section id="admin-panel" class="hidden bg-secondary/5 p-10 rounded-[3rem] border-2 border-secondary/20">
            <h3 class="text-2xl font-black text-secondary mb-8">Database Editor</h3>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
                <div class="space-y-4">
                    <input type="text" id="add-y" class="w-full p-4 rounded-xl shadow-md" placeholder="Y-DNA (z.B. J1)">
                    <input type="text" id="add-name" class="w-full p-4 rounded-xl shadow-md" placeholder="Name">
                    <select id="add-gov" class="w-full p-4 rounded-xl shadow-md"></select>
                    <button onclick="saveNewSample()" class="w-full bg-primary text-white p-4 rounded-xl font-black">SAVE KIT</button>
                </div>
            </div>
        </section>

        <section class="space-y-10">
            <h2 class="text-5xl font-black uppercase">Regional Archives</h2>
            <div id="stats-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8"></div>
        </section>
    </main>

    <script>
        const SB_URL = "https://lsfmpmfoqdtkgndtaxen.supabase.co";
        const SB_KEY = "sb_publishable_dnaPmhIN6Lp4irUSxYuAMQ_vzE_CCKT";
        const _supabase = supabase.createClient(SB_URL, SB_KEY);
        const ADMIN_PW = "LM10KING10.cba1312";

        const HAPLO_COLORS = { "R1B": "#FF0000", "E": "#00008B", "T": "#FFA500", "J1": "#006400", "L1": "#00FFFF", "G": "#444444", "J2": "#32CD32", "R1A": "#DEB887" };
        const GOV_LIST = ["Ad Daqahlīyah", "Al Fayyūm", "Al Gharbīyah", "Al Iskandarīyah", "Al Ismā`īlīyah", "Al Minūfīyah", "Al Minyā", "Al Qalyūbīyah", "As Suways", "Ash Sharqīyah", "Aswān", "Asyūt", "Banī Suwayf", "Cairo", "Dumyāt", "Giza", "Janūb Sīnā’", "Kafr ash Shaykh", "Luxor", "Matrouh", "Qinā", "Shamal Sīnā’", "Sūhāj", "—"].sort();

        let regionalData = {}; let databaseSamples = []; let charts = {};

        async function init() {
            const html = GOV_LIST.map(g => `<option value="${g}">${g}</option>`).join('');
            document.getElementById('add-gov').innerHTML = html;
            if (localStorage.getItem('is_admin') === 'true') document.getElementById('admin-panel').classList.remove('hidden');
            await loadAllData();
            renderUI(); renderDatabase();
        }

        async function loadAllData() {
            const [statsRes, samplesRes] = await Promise.all([
                _supabase.from('dna_stats').select('*'),
                _supabase.from('published_samples').select('*')
            ]);
            databaseSamples = samplesRes.data || [];
            regionalData = {}; GOV_LIST.forEach(g => regionalData[g] = {});

            // 1. Manuelle Statistik laden
            if (statsRes.data) {
                statsRes.data.forEach(row => {
                    const reg = row.region || "—";
                    if (regionalData[reg]) {
                        const hp = row.haplogroup.toUpperCase();
                        regionalData[reg][hp] = (regionalData[reg][hp] || 0) + parseInt(row.count);
                    }
                });
            }
            // 2. Detaillierte Kits dazu zählen (OHNE DOPPELZÄHLUNG)
            databaseSamples.forEach(s => {
                const reg = s.governorate || "—";
                if (regionalData[reg] && s.y_dna) {
                    const hp = s.y_dna.split('-')[0].split(' ')[0].toUpperCase();
                    // ACHTUNG: Nur Kits zählen, die NICHT bereits in der manuellen Liste sind.
                    // (Oder du nutzt dna_stats nur für Legacy und published_samples für ALLES Neue)
                    regionalData[reg][hp] = (regionalData[reg][hp] || 0) + 1;
                }
            });
        }

        function createPieChart(canvasId, dataMap, isMini) {
            const ctx = document.getElementById(canvasId).getContext('2d');
            if (charts[canvasId]) charts[canvasId].destroy();
            const labels = Object.keys(dataMap).filter(k => dataMap[k] > 0);
            charts[canvasId] = new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: labels,
                    datasets: [{ data: labels.map(k => dataMap[k]), backgroundColor: labels.map(l => HAPLO_COLORS[l] || "#CCC") }]
                },
                options: { responsive: true, plugins: { legend: { display: false } } }
            });
        }

        function renderDatabase() {
            const tbody = document.getElementById('database-body');
            const search = document.getElementById('dbSearch').value.toLowerCase();
            tbody.innerHTML = databaseSamples.filter(s => (s.y_dna+s.name+s.kit_number).toLowerCase().includes(search)).map(s => `
                <tr>
                    <td class="px-8 py-5"><span class="px-3 py-1 rounded-full text-white text-xs" style="background:${HAPLO_COLORS[s.y_dna?.split('-')[0]] || '#666'}">${s.y_dna || '—'}</span></td>
                    <td class="px-6 py-5 text-xs font-mono">${s.mt_dna || '—'}</td>
                    <td class="px-6 py-5 text-xs uppercase">${s.governorate || '—'}</td>
                    <td class="px-6 py-5 uppercase">${s.name || 'Anonymous'}</td>
                    <td class="px-6 py-5 text-xs text-center">${s.kit_number || '—'}</td>
                    <td class="px-8 py-5 text-right"><a href="${s.y_link_1}" target="_blank" class="bg-primary text-white p-1 rounded">Link</a></td>
                </tr>`).join('');
        }

        function renderUI() {
            const grid = document.getElementById('stats-grid'); grid.innerHTML = '';
            GOV_LIST.forEach((gov, idx) => {
                const data = regionalData[gov] || {}; const total = Object.values(data).reduce((a,b)=>a+b, 0);
                const canvasId = `chart-${idx}`;
                const card = document.createElement('div'); card.className = "stat-card"; card.onclick = () => openModal(gov);
                card.innerHTML = `<div class="w-16 h-16"><canvas id="${canvasId}"></canvas></div><div><h4 class="font-black text-xs uppercase">${gov}</h4><p class="text-[10px] text-gray-400">Total: ${total}</p></div>`;
                grid.appendChild(card);
                if (total > 0) setTimeout(() => createPieChart(canvasId, data, true), 50);
            });
            updateNationalSummary();
        }

        function updateNationalSummary() {
            const totals = {}; let grandTotal = 0;
            Object.values(regionalData).forEach(reg => Object.entries(reg).forEach(([hp, c]) => { totals[hp] = (totals[hp]||0)+c; grandTotal += c; }));
            document.getElementById('total-national-samples').innerText = grandTotal;
            document.getElementById('total-gov-count').innerText = GOV_LIST.length;
            if (grandTotal > 0) createPieChart('nationalChartCanvas', totals, false);
        }

        function openModal(gov) {
            const data = regionalData[gov]; const total = Object.values(data).reduce((a,b)=>a+b, 0);
            document.getElementById('modal-title').innerText = gov; document.getElementById('modal-sample').innerText = `TOTAL: ${total}`;
            document.getElementById('detail-modal').classList.add('active');
            setTimeout(() => createPieChart('modalChartCanvas', data, false), 50);
        }

        async function saveNewSample() {
            const payload = { y_dna: document.getElementById('add-y').value, name: document.getElementById('add-name').value, governorate: document.getElementById('add-gov').value };
            await _supabase.from('published_samples').insert([payload]); location.reload();
        }

        function handleAdminBtnClick() { document.getElementById('login-modal').classList.add('active'); }
        function tryLogin() { if (document.getElementById('admin-pw').value === ADMIN_PW) { localStorage.setItem('is_admin', 'true'); location.reload(); } }
        function closeLogin() { document.getElementById('login-modal').classList.remove('active'); }
        function closeModal(e) { if (!e || e.target.id === 'detail-modal') document.getElementById('detail-modal').classList.remove('active'); }

        init();
    </script>
</body>
</html>
