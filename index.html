<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Egyptian Y-DNA Project | National Genomic Archive</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { "primary": "#001736", "secondary": "#775a19", "background": "#f8f9fa" },
                    fontFamily: { "headline": ["Manrope"], "body": ["Inter"] },
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        #detail-modal { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(0, 23, 54, 0.6); backdrop-filter: blur(15px); align-items: center; justify-content: center; padding: 20px; }
        #detail-modal.active { display: flex; }
        .nav-link { cursor: pointer; position: relative; transition: all 0.3s; }
        .nav-link.active { color: #001736; font-weight: 800; }
        .nav-link.active::after { content: ''; position: absolute; bottom: -5px; left: 0; width: 100%; height: 2px; background: #775a19; }
        .page-section { display: none; }
        .page-section.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .snp-path-text { word-break: break-all; white-space: normal; line-height: 1.4; display: block; }
        .modal-content { max-height: 90vh; overflow-y: auto; width: 100%; max-width: 1000px; scroll-behavior: smooth; border-radius: 3rem; }
        thead th { position: sticky; top: 80px; z-index: 30; background: white; box-shadow: 0 1px 0 #e5e7eb; }
    </style>
</head>
<body class="bg-background text-primary font-body antialiased">

    <!-- NAVIGATION -->
    <nav class="fixed top-0 w-full z-50 bg-white/90 backdrop-blur-xl border-b border-gray-100 h-20">
        <div class="flex justify-between items-center px-8 h-full max-w-screen-2xl mx-auto">
            <div class="flex flex-col">
                <h1 class="text-xl font-black uppercase tracking-tighter leading-none text-primary">Egyptian Y-DNA Project</h1>
                <p class="text-[9px] font-bold text-secondary uppercase tracking-widest mt-1 text-center">National Genomic Archive</p>
            </div>
            <div class="flex gap-8 items-center font-headline">
                <span onclick="showSection('home')" id="nav-home" class="nav-link active text-xs font-bold uppercase tracking-widest">Dashboard</span>
                <span onclick="showSection('archive')" id="nav-archive" class="nav-link text-xs font-bold uppercase tracking-widest text-gray-400">Sample Archive</span>
            </div>
        </div>
    </nav>

    <!-- SECTION DASHBOARD -->
    <main id="section-home" class="page-section active pt-28 pb-20 px-8 max-w-screen-2xl mx-auto space-y-16">
        <section class="grid grid-cols-1 lg:grid-cols-12 gap-12 items-center bg-white p-12 rounded-[4rem] shadow-xl border border-gray-100">
            <div class="lg:col-span-5 font-headline">
                <h2 class="text-7xl font-black tracking-tighter mb-8 leading-tight">National Summary</h2>
                <div class="grid grid-cols-2 gap-8 border-t pt-8">
                    <div><p class="text-[11px] font-bold text-gray-400 uppercase">Total Samples</p><p id="total-national-samples" class="text-6xl font-black text-primary">0</p></div>
                    <div><p class="text-[11px] font-bold text-gray-400 uppercase">Mapped Regions</p><p class="text-6xl font-black text-primary">24</p></div>
                </div>
            </div>
            <div class="lg:col-span-7 flex flex-col md:flex-row items-center gap-12 justify-center lg:justify-end">
                <div class="w-[320px] h-[320px] cursor-pointer"><canvas id="nationalChartCanvas"></canvas></div>
                <div id="national-legend" class="space-y-1.5 w-full max-w-[240px]"></div>
            </div>
        </section>
        <section class="space-y-10"><h2 class="text-5xl font-black font-headline uppercase tracking-tighter">Regional Archives</h2><div id="stats-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8"></div></section>
    </main>

    <!-- SECTION ARCHIVE -->
    <main id="section-archive" class="page-section pt-28 pb-20 px-8 max-w-screen-2xl mx-auto space-y-12">
        <header class="flex justify-between items-end">
            <div><p class="text-[10px] font-black text-secondary uppercase tracking-[0.3em] mb-2">— Genomic Catalog</p><h2 class="text-7xl font-black font-headline tracking-tighter leading-none text-primary">DNA Sample <span class="italic text-secondary font-medium text-6xl">Archive</span></h2></div>
            <input type="text" id="archiveSearch" oninput="renderArchive()" placeholder="Search kit, name or city..." class="w-96 p-4 bg-white border border-gray-100 rounded-2xl shadow-lg text-xs font-bold focus:ring-2 focus:ring-secondary outline-none">
        </header>
        <div class="bg-white rounded-[3rem] border border-gray-100 shadow-2xl overflow-x-auto">
            <table class="w-full text-left border-collapse table-fixed min-w-[1200px]">
                <thead>
                    <tr class="font-headline text-[9px] font-black uppercase tracking-widest text-gray-400">
                        <th class="w-[18%] px-8 py-6">Identification</th>
                        <th class="w-[10%] px-4 py-6">Kit/ID</th>
                        <th class="w-[12%] px-4 py-6 text-center">Governorate</th>
                        <th class="w-[28%] px-6 py-6">SNP Path (Y-DNA)</th>
                        <th class="w-[10%] px-4 py-6 text-center">Y-Links</th>
                        <th class="w-[12%] px-4 py-6 text-center">mtDNA</th>
                        <th class="w-[10%] px-8 py-6 text-center">mt-Links</th>
                    </tr>
                </thead>
                <tbody id="archive-table-body" class="divide-y divide-gray-50"></tbody>
            </table>
        </div>
    </main>

    <script>
        const SB_URL = "https://lsfmpmfoqdtkgndtaxen.supabase.co";
        const SB_KEY = "sb_publishable_dnaPmhIN6Lp4irUSxYuAMQ_vzE_CCKT";
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        const HAPLO_COLORS = { "R1B": "#FF0000", "E": "#00008B", "T": "#FFA500", "J1": "#006400", "L1": "#00FFFF", "B": "#008B8B", "G": "#444", "G2": "#444", "J2": "#32CD32", "R1A": "#DEB887", "A": "#000", "I2": "#C0C0C0", "A1A": "#555", "A1B1": "#888", "Q1": "#9400D3", "R2": "#f1c40f" };
        const GOV_LIST = ["Ad Daqahlīyah", "Al Fayyūm", "Al Gharbīyah", "Al Iskandarīyah", "Al Ismā`īlīyah", "Al Minūfīyah", "Al Minyā", "Al Qalyūbīyah", "As Suways", "Ash Sharqīyah", "Aswān", "Asyūt", "Banī Suwayf", "Cairo", "Dumyāt", "Giza", "Janūb Sīnā’", "Kafr ash Shaykh", "Luxor", "Matrouh", "Qinā", "Shamal Sīnā’", "Sūhāj", "—"].sort();

        let databaseSamples = []; let regionalData = {}; let charts = {};

        async function init() { await loadAllData(); renderUI(); renderArchive(); }

        async function loadAllData() {
            try {
                const [statsRes, samplesRes] = await Promise.all([ _supabase.from('dna_stats').select('*'), _supabase.from('published_samples').select('*') ]);
                databaseSamples = samplesRes.data || [];
                regionalData = {}; GOV_LIST.forEach(g => regionalData[g] = {});
                if (statsRes.data) {
                    statsRes.data.forEach(row => {
                        let reg = row.region || "—";
                        if (regionalData[reg]) {
                            let hp = row.haplogroup.toUpperCase().trim();
                            regionalData[reg][hp] = (regionalData[reg][hp] || 0) + parseInt(row.count);
                        }
                    });
                }
            } catch (err) { console.error(err); }
        }

        function renderArchive() {
            const tbody = document.getElementById('archive-table-body');
            const search = document.getElementById('archiveSearch').value.toLowerCase();
            
            // FILTERN & SORTIEREN NACH BUNDESLAND (GOVERNORATE)
            const filtered = databaseSamples
                .filter(s => (s.name + (s.kit_number||'') + (s.governorate||'') + (s.y_dna||'')).toLowerCase().includes(search))
                .sort((a, b) => (a.governorate || "—").localeCompare(b.governorate || "—"));

            tbody.innerHTML = filtered.map(s => {
                const kitH = s.y_dna?.trim().substring(0,1).toUpperCase();
                return `
                <tr class="hover:bg-gray-50 transition-colors">
                    <td class="px-8 py-7"><p class="font-black text-primary uppercase text-sm leading-tight">${s.name || 'Anonymous'}</p></td>
                    <td class="px-4 py-7 font-mono text-[10px] font-bold text-gray-400">${s.kit_number || '—'}</td>
                    <td class="px-4 py-7 text-[10px] font-black text-gray-400 uppercase text-center">${s.governorate || '—'}</td>
                    <td class="px-6 py-7"><div class="flex items-start gap-3"><span class="w-2 h-2 rounded-full mt-1.5 flex-shrink-0" style="background:${HAPLO_COLORS[kitH] || '#CCC'}"></span><span class="text-[10px] font-mono font-bold text-gray-500 snp-path-text">${s.snp_path || s.y_dna || '—'}</span></div></td>
                    <td class="px-4 py-7 text-center">${buildLinks(s, 'y')}</td>
                    <!-- Position getauscht: Erst mtDNA Text -->
                    <td class="px-4 py-7 text-center uppercase text-[11px] font-black text-secondary">${s.mt_dna || '—'}</td>
                    <!-- Dann mt-Links -->
                    <td class="px-8 py-7 text-center">${buildLinks(s, 'mt')}</td>
                </tr>`;
            }).join('');
        }

        function buildLinks(s, type) {
            const l1 = type === 'y' ? s.y_link_1 : s.mt_link_1;
            const l2 = type === 'y' ? s.y_link_2 : s.mt_link_2;
            const color = type === 'y' ? 'bg-primary' : 'bg-secondary';
            let html = '<div class="flex gap-1.5 justify-center">';
            if (l1 && l1.length > 5 && l1 !== '—') html += `<a href="${l1}" target="_blank" class="w-7 h-7 rounded-lg ${color} text-white flex items-center justify-center hover:scale-110 transition-transform"><span class="material-symbols-outlined text-[14px]">${type === 'y' ? 'database' : 'link'}</span></a>`;
            if (l2 && l2.length > 5 && l2 !== '—') html += `<a href="${l2}" target="_blank" class="w-7 h-7 rounded-lg ${color} text-white flex items-center justify-center hover:scale-110 transition-transform"><span class="material-symbols-outlined text-[14px]">link</span></a>`;
            html += '</div>';
            return html;
        }

        function showSection(id) {
            document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active', 'text-gray-400'));
            document.getElementById(`section-${id}`).classList.add('active');
            document.getElementById(`nav-${id}`).classList.add('active');
        }

        // Dashboard UI & Charts
        function renderUI() {
            const grid = document.getElementById('stats-grid'); grid.innerHTML = '';
            GOV_LIST.forEach((gov, idx) => {
                const data = regionalData[gov] || {}; const total = Object.values(data).reduce((a,b)=>a+b, 0);
                const canvasId = `chart-${idx}`;
                const card = document.createElement('div'); card.className = "stat-card"; 
                card.innerHTML = `<div class="w-16 h-16 flex-shrink-0"><canvas id="${canvasId}"></canvas></div><div class="min-w-0"><h4 class="font-black text-xs uppercase truncate">${gov}</h4><p class="text-[10px] text-gray-400 font-bold">Total: ${total}</p></div>`;
                grid.appendChild(card);
                if (total > 0) setTimeout(() => createPieChart(canvasId, data), 50);
            });
            updateNationalSummary();
        }

        function updateNationalSummary() {
            const totals = {}; let grandTotal = 0;
            Object.values(regionalData).forEach(reg => Object.entries(reg).forEach(([hp, count]) => { totals[hp] = (totals[hp] || 0) + count; grandTotal += count; }));
            document.getElementById('total-national-samples').innerText = grandTotal;
            if (grandTotal > 0) createPieChart('nationalChartCanvas', totals);
        }

        function createPieChart(canvasId, dataMap) {
            const ctx = document.getElementById(canvasId).getContext('2d');
            if (charts[canvasId]) charts[canvasId].destroy();
            const labels = Object.keys(dataMap).filter(k => dataMap[k] > 0);
            charts[canvasId] = new Chart(ctx, {
                type: 'pie',
                data: { labels, datasets: [{ data: labels.map(k => dataMap[k]), backgroundColor: labels.map(l => HAPLO_COLORS[l] || "#CCC"), borderWidth: 1 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        }

        init();
    </script>
</body>
</html>
