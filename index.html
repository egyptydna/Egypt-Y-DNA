<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Egyptian Y-DNA Project | National Genomic Archive</title>
    
    <meta name="google-site-verification" content="Uaawg80AzlTHbqfR-OfSFSJdBAtg9OIjpOVgCRrWXHY" />
    <meta name="description" content="Official archive of the Egyptian Y-DNA Project. Explore paternal and maternal lineages in Egypt through high-resolution genomic data.">

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { "primary": "#001736", "secondary": "#775a19", "background": "#f8f9fa" },
                    fontFamily: { "headline": ["Manrope"], "body": ["Inter"] },
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        #detail-modal { display: none; position: fixed; inset: 0; z-index: 1000; background: rgba(0, 23, 54, 0.6); backdrop-filter: blur(15px); align-items: center; justify-content: center; padding: 15px; }
        #detail-modal.active { display: flex; }
        .modal-content { max-height: 90vh; overflow-y: auto; width: 100%; max-width: 1050px; border-radius: 2rem; scroll-behavior: smooth; }

        .nav-link { cursor: pointer; position: relative; transition: all 0.3s; font-size: 0.75rem; }
        .nav-link.active { color: #001736; font-weight: 800; }
        .nav-link.active::after { content: ''; position: absolute; bottom: -5px; left: 0; width: 100%; height: 2px; background: #775a19; }
        
        .page-section { display: none; }
        .page-section.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .stat-card { transition: all 0.3s ease; border: 1px solid #eef0f2; cursor: pointer; background: white; padding: 1.5rem; border-radius: 2rem; display: flex; align-items: center; gap: 1.25rem; }
        .stat-card:hover { border-color: #001736; transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,23,54,0.1); }
        
        .archive-inner-scroll { overflow-x: auto; border-radius: 2rem; border: 1px solid #e5e7eb; background: white; -webkit-overflow-scrolling: touch; }
        table { width: 100%; border-collapse: collapse; }
        
        .static-thead th { padding: 15px 10px; background-color: #f1f5f9; border-bottom: 2px solid #e2e8f0; color: #475569; font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 800; }
        
        .align-v-center { vertical-align: middle !important; }
        .snp-path-text { word-break: break-word; overflow-wrap: anywhere; white-space: normal; line-height: 1.6; display: inline-block; width: 100%; }
        .social-link { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; color: #9ca3af; transition: all 0.3s; display: flex; align-items: center; gap: 10px; }
        .social-link:hover { color: #001736; }

        /* Phylogeny Tree Enhanced Styles */
        .tree-container { padding-bottom: 50px; }
        .tree-node { border-left: 2px solid currentColor; margin-left: 1.2rem; padding-left: 1.5rem; position: relative; transition: border-color 0.3s; }
        .tree-node::before { content: ""; position: absolute; left: 0; top: 1.1rem; width: 1.2rem; height: 2px; background: currentColor; }
        .branch-content { display: block; }
        .branch-content.collapsed { display: none; }
        .tree-toggle { cursor: pointer; user-select: none; transition: transform 0.2s; display: inline-block; }
        .tree-toggle.collapsed { transform: rotate(-90deg); }
        .node-label { font-weight: 900; text-transform: uppercase; font-family: monospace; letter-spacing: -0.05em; font-size: 0.85rem; }
    </style>
</head>
<body class="bg-background text-primary font-body antialiased text-left">

    <!-- NAVIGATION BAR -->
    <nav class="relative w-full bg-white border-b border-gray-100 h-20 z-50">
        <div class="flex justify-between items-center px-4 md:px-8 h-full max-w-screen-2xl mx-auto">
            <div class="flex items-center gap-2 md:gap-8">
                <a href="#" onclick="window.location.reload(); return false;" class="flex flex-col group">
                    <h1 class="text-xs md:text-xl font-black uppercase tracking-tighter leading-none text-primary group-hover:text-secondary transition-colors text-left font-headline">Egyptian Y-DNA Project</h1>
                    <p class="text-[7px] md:text-[9px] font-bold text-gray-400 uppercase tracking-widest mt-1 text-left font-headline">National Genomic Archive</p>
                </a>
                <div class="hidden md:flex items-center gap-6 border-l pl-6 border-gray-100 ml-4">
                    <a href="https://x.com/egyptydna?s=21" target="_blank" class="social-link">Twitter (X)</a>
                    <a href="mailto:egyptydna@gmail.com" class="social-link"><span class="material-symbols-outlined text-xl">mail</span></a>
                </div>
            </div>
            <div class="flex gap-4 md:gap-8 items-center font-headline text-primary whitespace-nowrap overflow-x-auto no-scrollbar">
                <span onclick="showSection('home')" id="nav-home" class="nav-link active uppercase tracking-widest font-bold font-headline">Dashboard</span>
                <span onclick="showSection('archive')" id="nav-archive" class="nav-link uppercase tracking-widest text-gray-400 font-bold font-headline">Archive</span>
                <span onclick="showSection('ancient')" id="nav-ancient" class="nav-link uppercase tracking-widest text-gray-400 font-bold font-headline">Ancient DNA</span>
                <span onclick="showSection('tree')" id="nav-tree" class="nav-link uppercase tracking-widest text-gray-400 font-bold font-headline">Phylogeny</span>
            </div>
        </div>
    </nav>

    <!-- SECTION DASHBOARD -->
    <main id="section-home" class="page-section active py-10 md:py-16 px-4 md:px-8 max-w-screen-2xl mx-auto space-y-16">
        <section class="grid grid-cols-1 lg:grid-cols-12 gap-12 items-center bg-white p-8 md:p-12 rounded-[3rem] md:rounded-[4rem] shadow-xl border border-gray-100">
            <div class="lg:col-span-5 font-headline">
                <h2 class="text-4xl md:text-7xl font-black tracking-tighter mb-8 leading-tight text-primary text-left">Modern Summary</h2>
                <div class="grid grid-cols-2 gap-8 border-t pt-8 text-primary font-bold">
                    <div><p class="text-[11px] font-bold text-gray-400 uppercase">Total Samples</p><p id="total-national-samples" class="text-4xl md:text-6xl font-black">0</p></div>
                    <div><p class="text-[11px] font-bold text-gray-400 uppercase">Mapped Regions</p><p class="text-4xl md:text-6xl font-black">25</p></div>
                </div>
            </div>
            <div class="lg:col-span-7 flex flex-col md:flex-row items-center gap-8 md:gap-12 justify-center lg:justify-end font-headline font-bold">
                <div class="w-full max-w-[300px] md:w-[320px] cursor-pointer"><canvas id="nationalChartCanvas"></canvas></div>
                <div id="national-legend" class="space-y-1 w-full max-w-[240px] text-[11px] font-headline font-bold"></div>
            </div>
        </section>
        <div id="stats-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 md:gap-8"></div>
    </main>

    <!-- SECTION ARCHIVE -->
    <main id="section-archive" class="page-section py-10 md:py-16 px-4 md:px-8 max-w-screen-2xl mx-auto space-y-12">
        <!-- Deine Tabelle von oben -->
        <tbody id="archive-table-body"></tbody>
    </main>

    <!-- SECTION ANCIENT -->
    <main id="section-ancient" class="page-section py-10 md:py-16 px-4 md:px-8 max-w-screen-2xl mx-auto space-y-12">
        <!-- Deine Ancient Tabelle -->
        <tbody id="ancient-table-body"></tbody>
    </main>

    <!-- SECTION PHYLOGENETIC TREE (NEU & VERBESSERT) -->
    <main id="section-tree" class="page-section py-10 md:py-16 px-4 md:px-8 max-w-screen-4xl mx-auto space-y-10">
        <header class="flex flex-col md:flex-row justify-between items-end gap-6 border-b pb-10 border-gray-100">
            <div class="text-left font-headline">
                <p class="text-[10px] font-black text-secondary uppercase tracking-[0.3em] mb-2">— Divergence Points</p>
                <h2 class="text-4xl md:text-7xl font-black tracking-tighter leading-none text-primary">Phylogeny</h2>
            </div>
            <div class="flex gap-3">
                <button onclick="expandAllTree()" class="px-5 py-2.5 bg-white border border-gray-200 rounded-xl text-[10px] font-black uppercase hover:bg-gray-50 transition-all font-headline">Expand All</button>
                <button onclick="collapseAllTree()" class="px-5 py-2.5 bg-white border border-gray-200 rounded-xl text-[10px] font-black uppercase hover:bg-gray-50 transition-all font-headline">Collapse All</button>
            </div>
        </header>
        <div class="bg-white rounded-[3rem] p-8 md:p-20 shadow-2xl border border-gray-50 min-h-[600px] overflow-x-auto">
            <div id="phylogeny-container" class="tree-container">
                <!-- Baum wird hier injiziert -->
            </div>
        </div>
    </main>

    <script>
        const SB_URL = "https://lsfmpmfoqdtkgndtaxen.supabase.co";
        const SB_KEY = "sb_publishable_dnaPmhIN6Lp4irUSxYuAMQ_vzE_CCKT";
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        const HAPLO_COLORS = { "J1": "#006400", "T": "#FFA500", "E": "#00008B", "R1B": "#FF0000", "L": "#00FFFF", "L1": "#00FFFF", "B": "#008B8B", "G": "#808080", "G2": "#808080", "I": "#EE82EE", "I2": "#EE82EE", "R1A": "#DEB887", "R2": "#FFFF00", "H": "#8B4513", "H2": "#8B4513", "J2": "#32CD32", "Q": "#9400D3", "Q1": "#9400D3", "Q2": "#9400D3", "C": "#000000", "A": "#000000" };
        
        let databaseSamples = []; let ancientSamples = [];

        async function init() { 
            await loadAllData(); 
            updateModernSummary(); 
            updateAncientSummary(); 
            renderPhylogeny(); 
        }

        async function loadAllData() {
            try {
                const [samplesRes, ancientRes] = await Promise.all([ 
                    _supabase.from('Modern_published_samples').select('*'), 
                    _supabase.from('Ancient_published_samples').select('*') 
                ]);
                databaseSamples = samplesRes.data || [];
                ancientSamples = ancientRes.data || [];
            } catch (err) { console.error(err); }
        }

        function getKitHaploGroup(yDnaStr, snpPath) {
            const y = (yDnaStr || "").trim().toUpperCase();
            const s = (snpPath || "").trim().toUpperCase();
            if (y.includes("J2") || s.startsWith("J2")) return "J2";
            if (y.startsWith("J1") || y.startsWith("J-")) return "J1";
            if (s.includes("R1A") || y.startsWith("R1A")) return "R1A";
            if (s.includes("R1B") || y.startsWith("R1B")) return "R1B";
            if (y.startsWith("E") || s.startsWith("E")) return "E";
            return y.substring(0,1);
        }

        // --- PHYLOGENY RENDERING MIT COLLAPSING & PREFIX ---
        function renderPhylogeny() {
            const container = document.getElementById('phylogeny-container');
            const allSamples = [...databaseSamples.map(s=>({...s, t:'m'})), ...ancientSamples.map(s=>({...s, t:'a'}))];
            
            const rawTree = {};

            allSamples.forEach(s => {
                const rawPath = (s.snp_path || s.y_dna || '').split(/[>]+/).map(x => x.trim()).filter(x => x && x !== '—');
                if (rawPath.length === 0) return;

                const baseHaplo = getKitHaploGroup(s.y_dna, s.snp_path);
                
                // Prefix Logik: Stelle sicher, dass jeder SNP J- oder E- etc. davor hat
                const cleanPath = rawPath.map(snp => {
                    if (snp.includes('-')) return snp;
                    return `${baseHaplo}-${snp}`;
                });

                let curr = rawTree;
                cleanPath.forEach((snp, i) => {
                    if(!curr[snp]) curr[snp] = { _s: [], _c: {} };
                    if(i === cleanPath.length - 1) curr[snp]._s.push(s);
                    curr = curr[snp]._c;
                });
            });

            // Rekursive Funktion zum Bauen des HTML mit "Pruning" (Zusammenfassen leerer Pfade)
            const buildHTML = (obj, parentColor = "#e5e7eb") => {
                let html = '<ul class="branch-content">';
                const keys = Object.keys(obj).sort();

                keys.forEach(key => {
                    const node = obj[key];
                    const childKeys = Object.keys(node._c);
                    const hasSamples = node._s.length > 0;
                    const haploKey = key.split('-')[0].toUpperCase();
                    const currentColor = HAPLO_COLORS[haploKey] || parentColor;

                    // PRUNING LOGIK: Wenn nur 1 Kind und KEINE Probe hier liegt -> SNP überspringen und tiefer gehen
                    if (!hasSamples && childKeys.length === 1) {
                        html = buildHTML(node._c, currentColor); // Überspringe dieses Level
                    } else {
                        html += `<li class="tree-node" style="color: ${currentColor}">
                            <div class="flex items-center gap-2 py-2">
                                ${childKeys.length > 0 ? `<span class="tree-toggle material-symbols-outlined text-sm opacity-30 hover:opacity-100 transition-all" onclick="toggleBranch(this)">arrow_drop_down</span>` : '<span class="w-4"></span>'}
                                <span class="node-label">${key}</span>`;
                        
                        node._s.forEach(s => {
                            const isA = s.t === 'a';
                            html += `<span class="px-3 py-1 ${isA ? 'bg-secondary' : 'bg-primary'} text-white text-[9px] rounded-full font-black uppercase ml-2 shadow-sm">${isA ? 'Ancient ' : ''}${s.name}</span>`;
                        });

                        html += `</div>`;
                        if (childKeys.length > 0) {
                            html += buildHTML(node._c, currentColor);
                        }
                        html += `</li>`;
                    }
                });
                return html + '</ul>';
            };

            container.innerHTML = buildHTML(rawTree);
        }

        function toggleBranch(el) {
            const content = el.parentElement.nextElementSibling;
            if (content) {
                content.classList.toggle('collapsed');
                el.classList.toggle('collapsed');
            }
        }

        function expandAllTree() {
            document.querySelectorAll('.branch-content').forEach(b => b.classList.remove('collapsed'));
            document.querySelectorAll('.tree-toggle').forEach(t => t.classList.remove('collapsed'));
        }

        function collapseAllTree() {
            document.querySelectorAll('.branch-content').forEach(b => b.classList.add('collapsed'));
            document.querySelectorAll('.tree-toggle').forEach(t => t.classList.add('collapsed'));
        }

        function showSection(id) {
            document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(n => { n.classList.remove('active'); n.classList.add('text-gray-400'); });
            document.getElementById(`section-${id}`).classList.add('active');
            document.getElementById(`nav-${id}`).classList.add('active');
            document.getElementById(`nav-${id}`).classList.remove('text-gray-400');
        }

        function closeModal(e) { if (!e || e.target.id === 'detail-modal') document.getElementById('detail-modal').classList.remove('active'); }
        init();
    </script>
</body>
</html>
