<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Egyptian Y-DNA Project | National Genomic Archive</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { "primary": "#001736", "secondary": "#775a19", "background": "#f8f9fa" },
                    fontFamily: { "headline": ["Manrope"], "body": ["Inter"] },
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        
        #detail-modal { display: none; position: fixed; inset: 0; z-index: 1000; background: rgba(0, 23, 54, 0.6); backdrop-filter: blur(15px); align-items: center; justify-content: center; padding: 20px; }
        #detail-modal.active { display: flex; }
        .modal-content { max-height: 90vh; overflow-y: auto; width: 100%; max-width: 1000px; scroll-behavior: smooth; border-radius: 3rem; }

        .nav-link { cursor: pointer; position: relative; transition: all 0.3s; }
        .nav-link.active { color: #001736; font-weight: 800; }
        .nav-link.active::after { content: ''; position: absolute; bottom: -5px; left: 0; width: 100%; height: 2px; background: #775a19; }
        
        .page-section { display: none; }
        /* WICHTIG: Kein transform in der Animation, da es das Sticky-Verhalten bricht */
        .page-section.active { display: block; animation: fadeIn 0.4s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .stat-card { transition: all 0.3s ease; border: 1px solid #eef0f2; cursor: pointer; background: white; padding: 1.5rem; border-radius: 2rem; display: flex; align-items: center; gap: 1.25rem; }
        .stat-card:hover { border-color: #001736; transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,23,54,0.1); }
        
        .snp-path-text { word-break: break-all; white-space: normal; line-height: 1.4; display: block; }

        /* --- KORRIGIERTER STICKY HEADER --- */
        .sticky-thead th {
            position: -webkit-sticky !important;
            position: sticky !important;
            /* Diese 80px entsprechen exakt der Höhe deiner Nav (h-20) */
            top: 80px !important; 
            z-index: 40 !important;
            background-color: #001736 !important; 
            color: white !important;
            border: none !important;
            /* Verhindert Lücken zwischen den Zellen beim Scrollen */
            outline: 1px solid #001736; 
        }

        /* Rundung nur oben am Container, wenn nicht gescrollt wird */
        .archive-inner-scroll { 
            overflow-x: auto; 
            overflow-y: visible !important; 
            border-radius: 3rem; 
            border: 1px solid #e5e7eb; 
            background: white;
        }

        /* Sorgt dafür, dass der Header beim ersten Laden direkt oben sitzt */
        table { border-collapse: separate; border-spacing: 0; width: 100%; }
        
        /* Fix für die Rundung der blauen Ecken */
        .sticky-thead th:first-child { border-top-left-radius: 2.95rem; }
        .sticky-thead th:last-child { border-top-right-radius: 2.95rem; }
    </style>
</head>
<body class="bg-background text-primary font-body antialiased">

    <!-- NAVIGATION (Höhe ist h-20 = 80px) -->
    <nav class="fixed top-0 w-full z-[100] bg-white/95 backdrop-blur-xl border-b border-gray-100 h-20">
        <div class="flex justify-between items-center px-8 h-full max-w-screen-2xl mx-auto">
            <div class="flex flex-col">
                <h1 class="text-xl font-black uppercase tracking-tighter leading-none text-primary">Egyptian Y-DNA Project</h1>
                <p class="text-[9px] font-bold text-secondary uppercase tracking-widest mt-1">National Genomic Archive</p>
            </div>
            <div class="flex gap-8 items-center font-headline">
                <span onclick="showSection('home')" id="nav-home" class="nav-link active text-xs font-bold uppercase tracking-widest">Dashboard</span>
                <span onclick="showSection('archive')" id="nav-archive" class="nav-link text-xs font-bold uppercase tracking-widest text-gray-400">Sample Archive</span>
            </div>
        </div>
    </nav>

    <!-- SECTION DASHBOARD (Hier unverändert) -->
    <main id="section-home" class="page-section active pt-28 pb-20 px-8 max-w-screen-2xl mx-auto space-y-16">
        <!-- ... (Dashboard Content) ... -->
        <section class="grid grid-cols-1 lg:grid-cols-12 gap-12 items-center bg-white p-12 rounded-[4rem] shadow-xl border border-gray-100">
            <div class="lg:col-span-5 font-headline">
                <h2 class="text-7xl font-black tracking-tighter mb-8 leading-tight text-primary">National Summary</h2>
                <div class="grid grid-cols-2 gap-8 border-t pt-8">
                    <div><p class="text-[11px] font-bold text-gray-400 uppercase">Total Samples</p><p id="total-national-samples" class="text-6xl font-black text-primary">0</p></div>
                    <div><p class="text-[11px] font-bold text-gray-400 uppercase">Mapped Regions</p><p class="text-6xl font-black text-primary">24</p></div>
                </div>
            </div>
            <div class="lg:col-span-7 flex flex-col md:flex-row items-center gap-12 justify-center lg:justify-end">
                <div class="w-[320px] h-[320px] cursor-pointer"><canvas id="nationalChartCanvas"></canvas></div>
                <div id="national-legend" class="space-y-1.5 w-full max-w-[240px]"></div>
            </div>
        </section>
        <section class="h-[600px] w-full bg-white rounded-[4rem] overflow-hidden shadow-2xl border border-gray-100">
            <iframe src="https://umap.openstreetmap.de/de/map/egypt-y-dna-project_128746?scaleControl=false&miniMap=false&scrollWheelZoom=false&datalayersControl=true#6/26.938/30.802" class="w-full h-full border-none"></iframe>
        </section>
        <section class="space-y-10"><h2 class="text-5xl font-black font-headline uppercase tracking-tighter">Regional Archives</h2><div id="stats-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8"></div></section>
    </main>

    <!-- SECTION ARCHIVE (Hier sind die Korrekturen) -->
    <main id="section-archive" class="page-section pt-28 pb-20 px-8 max-w-screen-2xl mx-auto space-y-12">
        <header class="flex justify-between items-end">
            <div><p class="text-[10px] font-black text-secondary uppercase tracking-[0.3em] mb-2">— Genomic Catalog</p><h2 class="text-7xl font-black font-headline tracking-tighter leading-none text-primary">DNA Sample Archive</h2></div>
            <input type="text" id="archiveSearch" oninput="renderArchive()" placeholder="Search kit, name or city..." class="w-96 p-4 bg-white border border-gray-100 rounded-2xl shadow-lg text-xs font-bold focus:ring-2 focus:ring-secondary outline-none">
        </header>

        <div class="archive-outer-container">
            <div class="archive-inner-scroll shadow-2xl">
                <table class="table-fixed min-w-[1200px]">
                    <thead class="sticky-thead">
                        <!-- BG-Primary hier zur Sicherheit auch als Klasse -->
                        <tr class="font-headline text-[9px] font-black uppercase tracking-widest bg-primary text-white">
                            <th class="w-[18%] px-8 py-6 text-left">Identification</th>
                            <th class="w-[10%] px-4 py-6 text-center">Kit/ID</th>
                            <th class="w-[12%] px-4 py-6 text-center">Governorate</th>
                            <th class="w-[28%] px-6 py-6 text-left">SNP Path (Y-DNA)</th>
                            <th class="w-[10%] px-4 py-6 text-center">Y-Links</th>
                            <th class="w-[12%] px-4 py-6 text-center">mtDNA</th>
                            <th class="w-[10%] px-8 py-6 text-center">mt-Links</th>
                        </tr>
                    </thead>
                    <tbody id="archive-table-body" class="divide-y divide-gray-50 bg-white">
                        <!-- Daten werden hier eingefügt -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- ... (Modals & Scripts bleiben gleich, aber renderArchive wurde leicht angepasst für bessere Abstände) ... -->

    <script>
        const SB_URL = "https://lsfmpmfoqdtkgndtaxen.supabase.co";
        const SB_KEY = "sb_publishable_dnaPmhIN6Lp4irUSxYuAMQ_vzE_CCKT";
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        const HAPLO_COLORS = { 
            "J1": "#006400", "T": "#FFA500", "E": "#00008B", "R1B": "#FF0000", "L": "#00FFFF", 
            "B": "#008B8B", "G": "#808080", "I": "#EE82EE", "R1A": "#DEB887", "R2": "#FFFF00", 
            "H": "#8B4513", "J2": "#32CD32", "Q": "#9400D3", "C": "#FFFFFF", "A": "#000000" 
        };
        
        const GOV_LIST = ["Ad Daqahlīyah", "Al Fayyūm", "Al Gharbīyah", "Al Iskandarīyah", "Al Ismā`īlīyah", "Al Minūfīyah", "Al Minyā", "Al Qalyūbīyah", "As Suways", "Ash Sharqīyah", "Aswān", "Asyūt", "Banī Suwayf", "Cairo", "Dumyāt", "Giza", "Janūb Sīnā’", "Kafr ash Shaykh", "Luxor", "Matrouh", "Qinā", "Shamal Sīnā’", "Sūhāj", "—"].sort();

        let databaseSamples = []; let regionalData = {}; let charts = {};

        async function init() { await loadAllData(); renderUI(); renderArchive(); }

        function superClean(str) {
            if(!str || str === '—') return "";
            return str.toString().trim().normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().replace(/[^a-z0-9]/g, "");
        }

        async function loadAllData() {
            try {
                const [statsRes, samplesRes] = await Promise.all([ _supabase.from('dna_stats').select('*'), _supabase.from('published_samples').select('*') ]);
                databaseSamples = samplesRes.data || [];
                regionalData = {}; GOV_LIST.forEach(g => regionalData[g] = {});
                if (statsRes.data) {
                    statsRes.data.forEach(row => {
                        const dbRegClean = superClean(row.region);
                        const match = GOV_LIST.find(g => superClean(g) === dbRegClean);
                        const finalReg = match || "—";
                        let hp = row.haplogroup.toUpperCase().trim();
                        if (hp === "J") hp = "J1";
                        if (!regionalData[finalReg]) regionalData[finalReg] = {};
                        regionalData[finalReg][hp] = (regionalData[finalReg][hp] || 0) + parseInt(row.count);
                    });
                }
            } catch (err) { console.error(err); }
        }

        function getKitHaploGroup(yDnaStr, snpPath) {
            const y = (yDnaStr || "").trim().toUpperCase();
            const s = (snpPath || "").trim().toUpperCase();
            if (y.includes("J2") || s.startsWith("J2") || y.includes("J-PH") || y.includes("J-FTE")) return "J2";
            if (y.startsWith("J1") || y.startsWith("J-")) return "J1";
            if (s.includes("R1A") || y.startsWith("R1A")) return "R1A";
            if (s.includes("R1B") || y.startsWith("R1B") || y.startsWith("R-PF6") || y.startsWith("R-FT2")) return "R1B";
            if (s.includes("R2") || y.startsWith("R2")) return "R2";
            if (y.startsWith("A1A")) return "A1A";
            if (y.startsWith("A1B1")) return "A1B1";
            return y.substring(0,1);
        }

        function renderLinks(s, type) {
            const l1 = type === 'y' ? s.y_link_1 : s.mt_link_1;
            const l2 = type === 'y' ? s.y_link_2 : s.mt_link_2;
            const color = type === 'y' ? 'bg-primary' : 'bg-secondary';
            let html = '<div class="flex gap-1.5 justify-center">';
            [l1, l2].forEach((link, i) => {
                if (link && link.length > 5 && link !== '—') {
                    html += `<a href="${link}" target="_blank" class="w-7 h-7 rounded-lg ${color} text-white flex items-center justify-center hover:scale-110 transition-transform shadow-sm"><span class="material-symbols-outlined text-[14px] font-bold">${i === 0 && type === 'y' ? 'database' : 'link'}</span></a>`;
                }
            });
            html += '</div>';
            return html;
        }

        function renderArchive() {
            const tbody = document.getElementById('archive-table-body');
            const search = document.getElementById('archiveSearch').value.toLowerCase();
            
            const filtered = [...databaseSamples]
                .filter(s => (s.name + (s.kit_number||'') + (s.governorate||'') + (s.y_dna||'')).toLowerCase().includes(search))
                .sort((a, b) => {
                    const govA = a.governorate || "—";
                    const govB = b.governorate || "—";
                    if (govA === "—" && govB !== "—") return 1;
                    if (govA !== "—" && govB === "—") return -1;
                    return govA.localeCompare(govB);
                });
            tbody.innerHTML = filtered.map(s => {
                const hapGroup = getKitHaploGroup(s.y_dna, s.snp_path);
                const kitColor = HAPLO_COLORS[hapGroup] || HAPLO_COLORS[hapGroup.substring(0,1)] || '#CCC';
                return `<tr class="hover:bg-gray-50/80 transition-colors">
                    <td class="px-8 py-8"><p class="font-black text-primary uppercase text-sm leading-tight">${s.name || 'Anonymous'}</p></td>
                    <td class="px-4 py-8 font-mono text-[10px] font-bold text-gray-400 text-center">${s.kit_number || '—'}</td>
                    <td class="px-4 py-8 text-[10px] font-black text-gray-400 uppercase text-center">${s.governorate || '—'}</td>
                    <td class="px-6 py-8"><div class="flex items-start gap-3"><span class="w-2 h-2 rounded-full mt-1.5 flex-shrink-0" style="background:${kitColor}"></span><span class="text-[10px] font-mono font-bold text-gray-500 snp-path-text">${s.snp_path || s.y_dna || '—'}</span></div></td>
                    <td class="px-4 py-8 text-center">${renderLinks(s, 'y')}</td>
                    <td class="px-4 py-8 text-center uppercase text-[11px] font-black text-secondary">${s.mt_dna || '—'}</td>
                    <td class="px-8 py-8 text-center">${renderLinks(s, 'mt')}</td>
                </tr>`;
            }).join('');
        }

        function showSection(id) {
            document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active', 'text-gray-400'));
            document.getElementById(`section-${id}`).classList.add('active');
            document.getElementById(`nav-${id}`).classList.add('active');
            window.scrollTo(0,0);
        }

        function renderUI() {
            const grid = document.getElementById('stats-grid'); grid.innerHTML = '';
            GOV_LIST.forEach((gov, idx) => {
                const data = regionalData[gov] || {}; const total = Object.values(data).reduce((a,b)=>a+b, 0);
                const canvasId = `chart-${idx}`;
                const card = document.createElement('div'); card.className = "stat-card"; 
                card.onclick = () => openModal(gov);
                card.innerHTML = `<div class="w-16 h-16 flex-shrink-0"><canvas id="${canvasId}"></canvas></div><div class="min-w-0"><h4 class="font-black text-xs uppercase truncate text-primary">${gov}</h4><p class="text-[10px] text-gray-400 font-bold uppercase tracking-tighter">Total: ${total}</p></div>`;
                grid.appendChild(card);
                if (total > 0) setTimeout(() => createPieChart(canvasId, data, gov), 50);
            });
            updateNationalSummary();
        }

        function updateNationalSummary() {
            const totals = {}; let grandTotal = 0;
            Object.values(regionalData).forEach(reg => Object.entries(reg).forEach(([hp, count]) => { totals[hp] = (totals[hp] || 0) + count; grandTotal += count; }));
            document.getElementById('total-national-samples').innerText = grandTotal;
            if (grandTotal > 0) createPieChart('nationalChartCanvas', totals, null);
            const sorted = Object.entries(totals).sort((a,b) => b[1]-a[1]).slice(0, 15);
            document.getElementById('national-legend').innerHTML = sorted.map(([name, count]) => `<div onclick="showHaploDetails(null, '${name}')" class="flex items-center justify-between text-[11px] font-black border-b border-gray-50 pb-1 uppercase cursor-pointer hover:text-secondary transition-colors font-headline text-primary"><span>${name}</span><span>${((count/grandTotal)*100).toFixed(1)}%</span></div>`).join('');
        }
        
        function createPieChart(canvasId, dataMap, govName = null) {
            const ctx = document.getElementById(canvasId).getContext('2d');
            if (charts[canvasId]) charts[canvasId].destroy();
            const labels = Object.keys(dataMap).filter(k => dataMap[k] > 0);
            charts[canvasId] = new Chart(ctx, {
                type: 'pie',
                data: { labels, datasets: [{ data: labels.map(k => dataMap[k]), backgroundColor: labels.map(l => HAPLO_COLORS[l] || HAPLO_COLORS[l.substring(0,1)] || "#CCC"), borderWidth: 1, borderColor: '#fff' }] },
                options: { 
                    responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } },
                    onClick: (evt, el) => { if (el.length > 0) showHaploDetails(govName, labels[el[0].index]); }
                }
            });
        }

        init();
    </script>
</body>
</html>
