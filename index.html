<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Egyptian Y-DNA Project | National Genomic Archive</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { "primary": "#001736", "secondary": "#775a19", "background": "#f8f9fa" },
                    fontFamily: { "headline": ["Manrope"], "body": ["Inter"] },
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        #admin-panel { display: none; } #admin-panel.active { display: block; animation: slideDown 0.4s ease; }
        #detail-modal, #login-modal { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(0, 23, 54, 0.4); backdrop-filter: blur(12px); align-items: center; justify-content: center; padding: 20px; }
        #detail-modal.active, #login-modal.active { display: flex; }
        @keyframes slideDown { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body class="bg-background text-primary font-body antialiased">

    <!-- LOGIN MODAL -->
    <div id="login-modal">
        <div class="bg-white p-8 rounded-[2rem] shadow-2xl max-w-sm w-full text-center">
            <span class="material-symbols-outlined text-5xl text-secondary mb-4">lock</span>
            <h2 class="text-2xl font-black font-headline mb-4 text-primary">Admin Access</h2>
            <input type="password" id="admin-pw" class="w-full p-4 rounded-xl border-gray-200 border mb-4 text-center outline-none" placeholder="Enter Password">
            <div class="flex gap-3">
                <button onclick="closeLogin()" class="flex-1 p-3 rounded-xl bg-gray-100 font-bold">Cancel</button>
                <button onclick="tryLogin()" class="flex-1 p-3 rounded-xl bg-primary text-white font-bold">Login</button>
            </div>
        </div>
    </div>

    <!-- DETAIL MODAL -->
    <div id="detail-modal" onclick="closeModal(event)">
        <div class="bg-white w-full max-w-2xl rounded-[3rem] shadow-2xl p-10 relative overflow-hidden" onclick="event.stopPropagation()">
            <button onclick="closeModal(null)" class="absolute top-8 right-8 text-gray-400 hover:text-primary transition-colors">
                <span class="material-symbols-outlined text-4xl font-bold">close</span>
            </button>
            <div class="flex flex-col md:flex-row gap-12 items-center">
                <div class="w-[250px] h-[250px] flex-shrink-0">
                    <canvas id="modalChartCanvas"></canvas>
                </div>
                <div class="flex-1 w-full text-center md:text-left">
                    <h2 id="modal-title" class="text-5xl font-black font-headline tracking-tighter mb-1 text-primary leading-tight">Governorate</h2>
                    <p id="modal-sample" class="text-3xl font-black text-secondary uppercase tracking-tight mb-8 leading-none">TOTAL SAMPLES: 0</p>
                    <div id="modal-legend" class="space-y-2 border-t pt-8"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- NAVIGATION -->
    <nav class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-xl border-b border-gray-100">
        <div class="flex justify-between items-center px-6 h-20 max-w-screen-2xl mx-auto">
            <div class="flex flex-col">
                <h1 class="text-xl font-black font-headline uppercase tracking-tighter leading-none">Egyptian Y-DNA Project</h1>
                <p class="text-[9px] font-bold text-secondary uppercase tracking-widest mt-1">National Genomic Archive</p>
            </div>
            <div class="flex items-center gap-4">
                <a href="https://x.com/egyptydna" target="_blank" class="text-gray-400 hover:text-primary transition-colors"><span class="material-symbols-outlined">public</span></a>
                <button onclick="handleAdminBtnClick()" id="admin-btn" class="flex items-center gap-2 bg-primary text-white px-4 py-2 rounded-xl text-xs font-bold shadow-lg">
                    <span class="material-symbols-outlined text-sm" id="admin-icon">admin_panel_settings</span> <span id="admin-text">Admin Login</span>
                </button>
            </div>
        </div>
    </nav>

    <main class="pt-28 pb-20 px-6 max-w-screen-2xl mx-auto space-y-16">
        <!-- NATIONAL SUMMARY -->
        <section class="grid grid-cols-1 lg:grid-cols-12 gap-12 items-center bg-white p-10 rounded-[3rem] shadow-xl border border-gray-100">
            <div class="lg:col-span-5 text-center lg:text-left">
                <span class="text-[10px] font-black text-secondary uppercase tracking-[0.3em] mb-4 block">Consolidated Data</span>
                <h2 class="text-5xl font-black font-headline tracking-tighter mb-6 text-primary leading-tight">National Summary</h2>
                <div class="grid grid-cols-2 gap-8 w-full border-t pt-8">
                    <div><p class="text-[10px] font-bold text-gray-400 uppercase">Grand Total Samples</p><p id="total-national-samples" class="text-4xl font-black text-primary">0</p></div>
                    <div><p class="text-[10px] font-bold text-gray-400 uppercase">Mapped Regions</p><p id="total-gov-count" class="text-4xl font-black font-primary">0</p></div>
                </div>
            </div>
            <div class="lg:col-span-7 flex flex-col md:flex-row items-center gap-12 justify-center lg:justify-end">
                <div class="w-[280px] h-[280px]">
                    <canvas id="nationalChartCanvas"></canvas>
                </div>
                <div id="national-legend" class="space-y-2 w-full max-w-[240px]"></div>
            </div>
        </section>

        <!-- MAP -->
        <section class="h-[600px] w-full bg-white rounded-[3rem] overflow-hidden shadow-2xl border border-gray-100">
            <iframe src="https://umap.openstreetmap.de/de/map/egypt-y-dna-project_128746#6/26.834/30.795" class="w-full h-full border-none"></iframe>
        </section>

        <!-- ADMIN PANEL -->
        <section id="admin-panel" class="bg-secondary/5 p-8 rounded-[3rem] border-2 border-secondary/20">
            <h3 class="text-2xl font-black font-headline uppercase text-secondary mb-8 leading-none">Database Live Editor</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
                <div class="space-y-4">
                    <div class="grid grid-cols-2 gap-2">
                        <select id="edit-data-region" class="p-3 rounded-xl border-none shadow-sm text-sm"></select>
                        <input type="text" id="edit-haplo-name" class="p-3 rounded-xl border-none shadow-sm text-sm uppercase" placeholder="Haplogroup">
                    </div>
                    <div class="flex gap-2">
                        <input type="number" id="edit-haplo-count" class="flex-1 p-3 rounded-xl border-none shadow-sm text-sm" placeholder="Count">
                        <button onclick="saveToDatabase()" class="bg-primary text-white px-8 rounded-xl font-bold text-xs uppercase shadow-md transition-all">Update Database</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- REGIONAL GRID -->
        <section class="space-y-8">
            <div class="flex flex-col md:flex-row justify-between items-end gap-4">
                <h2 class="text-4xl font-black font-headline tracking-tighter leading-none text-primary">Regional Archives</h2>
                <input type="text" id="searchInput" oninput="renderUI()" placeholder="Search region..." class="p-4 rounded-2xl border-none shadow-sm text-sm w-full md:w-64 focus:ring-2 focus:ring-secondary outline-none">
            </div>
            <div id="stats-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
        </section>
    </main>

    <footer class="py-16 border-t border-gray-200 bg-white text-center">
        <h2 class="text-xl font-black font-headline uppercase tracking-tighter">Egyptian Y-DNA Project</h2>
        <p class="text-xs text-gray-400 font-bold uppercase tracking-[0.3em] mt-2">National Genomic Archive</p>
    </footer>

    <script>
        // --- DATABASE CONNECTION ---
        const SB_URL = "https://lsfmpmfoqdtkgndtaxen.supabase.co";
        const SB_KEY = "sb_publishable_dnaPmhIN6Lp4irUSxYuAMQ_vzE_CCKT";
        const _supabase = supabase.createClient(SB_URL, SB_KEY);
        const ADMIN_PW = "LM10KING10.cba1312";

        // FARBMAPPING NACH DEINEN WÜNSCHEN (uMap Konform)
        const HAPLO_COLORS = {
            "R1B": "#FF0000",       // Red
            "E": "#00008B",         // Dark Blue
            "T": "#FFA500",         // Orange
            "J1": "#006400",        // Dark Green
            "L1": "#00FFFF",        // Cyan
            "B": "#008B8B",         // Dark Cyan
            "G": "#444444", "G2": "#444444", // Dark Grey
            "Q": "#9400D3", "Q1": "#9400D3", "Q2": "#9400D3", // Dark Violet
            "H": "#8B4513", "H2": "#8B4513", // Saddle Brown
            "R2": "#FFFF00",        // Yellow
            "R1A": "#DEB887",       // Burly Wood
            "I": "#EE82EE", "I2": "#EE82EE", // Violet
            "C": "#FFFFFF",         // White
            "J2": "#32CD32"         // Lime Green
        };

        let regionalData = {};
        let charts = {}; 
        const govList = ["Ad Daqahlīyah", "Al Fayyūm", "Al Gharbīyah", "Al Iskandarīyah", "Al Ismā`īlīyah", "Al Minūfīyah", "Al Minyā", "Al Qalyūbīyah", "As Suways", "Ash Sharqīyah", "Aswān", "Asyūt", "Banī Suwayf", "Cairo", "Dumyāt", "Giza", "Janūb Sīnā’", "Kafr ash Shaykh", "Luxor", "Matrouh", "Qinā", "Shamal Sīnā’", "Sūhāj", "Unassigned Origin"].sort();

        async function init() {
            checkAuthUI();
            await fetchData();
            updateDropdowns();
            renderUI();
            document.getElementById('admin-pw').addEventListener('keypress', (e) => { if (e.key === 'Enter') tryLogin(); });
        }

        async function fetchData() {
            const { data } = await _supabase.from('dna_stats').select('*');
            regionalData = {};
            if (data) {
                data.forEach(row => {
                    if (!regionalData[row.region]) regionalData[row.region] = {};
                    regionalData[row.region][row.haplogroup] = row.count;
                });
            }
        }

        function createPieChart(canvasId, dataMap, isMini = true) {
            const ctx = document.getElementById(canvasId).getContext('2d');
            if (charts[canvasId]) charts[canvasId].destroy();

            const labels = Object.keys(dataMap);
            const values = Object.values(dataMap);
            const colors = labels.map(l => HAPLO_COLORS[l.toUpperCase()] || "#CCCCCC");

            charts[canvasId] = new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: labels,
                    datasets: [{
                        data: values,
                        backgroundColor: colors,
                        borderWidth: isMini ? 1 : 3,
                        borderColor: '#ffffff'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            enabled: true,
                            backgroundColor: 'rgba(0, 23, 54, 0.9)',
                            titleFont: { size: 14, weight: 'bold' },
                            bodyFont: { size: 13 },
                            padding: 12,
                            cornerRadius: 10,
                            callbacks: {
                                label: (context) => ` ${context.label}: ${context.raw} Proben`
                            }
                        }
                    },
                    hover: { mode: 'nearest', intersect: true },
                    animation: { duration: 600 }
                }
            });
        }

        async function saveToDatabase() {
            const region = document.getElementById('edit-data-region').value;
            const haplo = document.getElementById('edit-haplo-name').value.trim().toUpperCase();
            const count = parseInt(document.getElementById('edit-haplo-count').value);
            if (!region || !haplo || isNaN(count)) return alert("Error");
            await _supabase.from('dna_stats').upsert({ region, haplogroup: haplo, count }, { onConflict: 'region, haplogroup' });
            await fetchData(); renderUI(); alert("Updated Successfully!");
        }

        function renderUI() {
            const grid = document.getElementById('stats-grid');
            const search = document.getElementById('searchInput').value.toLowerCase();
            grid.innerHTML = '';
            
            govList.forEach((gov, idx) => {
                if (gov.toLowerCase().includes(search)) {
                    const data = regionalData[gov] || {};
                    const total = Object.values(data).reduce((a, b) => a + b, 0);
                    const canvasId = `chart-${idx}`;

                    const card = document.createElement('div');
                    card.className = "bg-white p-6 rounded-[2rem] shadow-sm border border-gray-100 flex items-center gap-4 hover:shadow-xl cursor-pointer transition-all hover:-translate-y-1";
                    card.onclick = () => openModal(gov);
                    card.innerHTML = `
                        <div class="w-16 h-16 flex-shrink-0"><canvas id="${canvasId}"></canvas></div>
                        <div class="min-w-0">
                            <h4 class="font-black text-[11px] uppercase truncate text-primary leading-tight">${gov}</h4>
                            <p class="text-[9px] text-gray-400 font-bold uppercase">Total: ${total}</p>
                        </div>
                    `;
                    grid.appendChild(card);
                    if (total > 0) createPieChart(canvasId, data, true);
                }
            });
            updateNationalSummary();
        }

        function updateNationalSummary() {
            const totals = {}; let grandTotal = 0;
            Object.values(regionalData).forEach(region => {
                Object.entries(region).forEach(([hp, count]) => {
                    totals[hp] = (totals[hp] || 0) + count; grandTotal += count;
                });
            });
            document.getElementById('total-national-samples').innerText = grandTotal.toLocaleString();
            document.getElementById('total-gov-count').innerText = govList.length;
            
            if (grandTotal > 0) createPieChart('nationalChartCanvas', totals, false);

            const sorted = Object.entries(totals).sort((a,b) => b[1]-a[1]).slice(0, 12);
            document.getElementById('national-legend').innerHTML = sorted.map(([name, count]) => `
                <div class="flex items-center justify-between text-[10px] font-bold border-b border-gray-50 pb-1 uppercase">
                    <div class="flex items-center gap-2">
                        <div class="w-2.5 h-2.5 rounded-full shadow-sm" style="background: ${HAPLO_COLORS[name.toUpperCase()] || '#CCC'}"></div>
                        <span>${name}</span>
                    </div>
                    <span>${((count/grandTotal)*100).toFixed(1)}% <span class="text-[8px] opacity-40 ml-1">(${count})</span></span>
                </div>`).join('');
        }

        function openModal(gov) {
            const data = regionalData[gov] || {};
            const total = Object.values(data).reduce((a, b) => a + b, 0);
            const sorted = Object.entries(data).sort((a,b) => b[1] - a[1]);
            document.getElementById('modal-title').innerText = gov;
            document.getElementById('modal-sample').innerText = `TOTAL SAMPLES: ${total}`;
            
            if (total > 0) setTimeout(() => createPieChart('modalChartCanvas', data, false), 50);
            
            document.getElementById('modal-legend').innerHTML = sorted.map(([name, count]) => `
                <div class="flex items-center justify-between p-3 bg-gray-50/50 rounded-2xl border border-gray-100/50">
                    <div class="flex items-center gap-4 text-primary">
                        <div class="w-5 h-5 rounded-full shadow-md" style="background: ${HAPLO_COLORS[name.toUpperCase()] || '#CCC'}"></div>
                        <span class="text-xl font-black uppercase tracking-tight">${name}</span>
                    </div>
                    <span class="font-black text-xl text-primary">${total > 0 ? ((count/total)*100).toFixed(1) : 0}% <span class="text-xs text-gray-400 font-bold ml-2">(${count})</span></span>
                </div>`).join('');
            document.getElementById('detail-modal').classList.add('active');
        }

        function updateDropdowns() { document.getElementById('edit-data-region').innerHTML = govList.map(g => `<option value="${g}">${g}</option>`).join(''); }
        function handleAdminBtnClick() { if (localStorage.getItem('is_admin') === 'true') { if (confirm("Logout?")) { localStorage.removeItem('is_admin'); location.reload(); } } else { document.getElementById('login-modal').classList.add('active'); } }
        function tryLogin() { if (document.getElementById('admin-pw').value === ADMIN_PW) { localStorage.setItem('is_admin', 'true'); location.reload(); } else alert("Error"); }
        function closeLogin() { document.getElementById('login-modal').classList.remove('active'); }
        function checkAuthUI() { if (localStorage.getItem('is_admin') === 'true') { document.getElementById('admin-panel').classList.add('active'); document.getElementById('admin-text').innerText = "Logout Admin"; document.getElementById('admin-btn').classList.add('bg-red-600'); } }
        function closeModal(e) { if (!e || e.target.id === 'detail-modal') document.getElementById('detail-modal').classList.remove('active'); }
        init();
    </script>
</body>
</html>
