<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Egyptian Y-DNA Project | National Genomic Archive</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { "primary": "#001736", "secondary": "#775a19", "background": "#f8f9fa" },
                    fontFamily: { "headline": ["Manrope"], "body": ["Inter"] },
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        #detail-modal { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(0, 23, 54, 0.6); backdrop-filter: blur(15px); align-items: center; justify-content: center; padding: 20px; }
        #detail-modal.active { display: flex; }
        .stat-card { transition: all 0.3s ease; border: 1px solid #eef0f2; cursor: pointer; background: white; padding: 1.5rem; border-radius: 2.5rem; display: flex; align-items: center; gap: 1.25rem; }
        .stat-card:hover { border-color: #001736; transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,23,54,0.1); }
        .modal-content { max-height: 90vh; overflow-y: auto; scroll-behavior: smooth; width: 100%; max-width: 950px; }
        canvas { cursor: pointer; }
    </style>
</head>
<body class="bg-background text-primary font-body antialiased">

    <!-- DETAIL MODAL -->
    <div id="detail-modal" onclick="closeModal(event)">
        <div class="bg-white rounded-[3rem] shadow-2xl p-10 relative border border-gray-100 modal-content" onclick="event.stopPropagation()">
            <button onclick="closeModal(null)" class="absolute top-8 right-8 text-gray-400 hover:text-red-500 transition-colors"><span class="material-symbols-outlined text-4xl font-bold">close</span></button>
            
            <div class="flex flex-col md:flex-row gap-12 items-center">
                <div class="w-[300px] h-[300px] flex-shrink-0">
                    <canvas id="modalChartCanvas"></canvas>
                </div>
                <div class="flex-1 w-full text-center md:text-left">
                    <h2 id="modal-title" class="text-5xl font-black font-headline uppercase text-primary tracking-tighter leading-none">Governorate</h2>
                    <p id="modal-sample" class="text-2xl font-black text-secondary uppercase bg-secondary/5 px-6 py-1 rounded-full inline-block mt-4">TOTAL: 0</p>
                    <div id="modal-legend" class="space-y-2 border-t pt-8 mt-8"></div>
                </div>
            </div>

            <!-- KIT LIST AREA -->
            <div id="modal-kit-list" class="mt-12 border-t pt-10 hidden">
                <h3 class="text-2xl font-black uppercase text-primary tracking-tighter flex items-center gap-3 mb-6">
                    <span class="material-symbols-outlined text-secondary">database</span> 
                    Lineage Details: <span id="selected-haplo-name" class="text-secondary">—</span>
                </h3>
                <div id="kits-container" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- Kits will be injected here -->
                </div>
            </div>
        </div>
    </div>

    <!-- NAVIGATION -->
    <nav class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-xl border-b border-gray-100 h-20">
        <div class="flex justify-between items-center px-6 h-full max-w-screen-2xl mx-auto">
            <div class="flex flex-col">
                <h1 class="text-xl font-black uppercase tracking-tighter leading-none">Egyptian Y-DNA Project</h1>
                <p class="text-[9px] font-bold text-secondary uppercase tracking-widest mt-1">National Genomic Archive</p>
            </div>
        </div>
    </nav>

    <main class="pt-28 pb-20 px-6 max-w-screen-2xl mx-auto space-y-16">
        
        <!-- NATIONAL SUMMARY -->
        <section class="grid grid-cols-1 lg:grid-cols-12 gap-12 items-center bg-white p-10 rounded-[4rem] shadow-xl border border-gray-100">
            <div class="lg:col-span-5 font-headline">
                <h2 class="text-6xl font-black tracking-tighter mb-8 leading-tight text-primary">National Summary</h2>
                <div class="grid grid-cols-2 gap-8 border-t pt-8">
                    <div><p class="text-[11px] font-bold text-gray-400 uppercase">Total Samples</p><p id="total-national-samples" class="text-5xl font-black text-primary">0</p></div>
                    <div><p class="text-[11px] font-bold text-gray-400 uppercase">Mapped Regions</p><p id="total-gov-count" class="text-5xl font-black text-primary">24</p></div>
                </div>
            </div>
            <div class="lg:col-span-7 flex flex-col md:flex-row items-center gap-12 justify-center lg:justify-end">
                <div class="w-[300px] h-[300px]"><canvas id="nationalChartCanvas"></canvas></div>
                <div id="national-legend" class="space-y-1.5 w-full max-w-[240px]"></div>
            </div>
        </section>

        <!-- DATABASE TABLE -->
        <section class="space-y-8">
            <h2 class="text-5xl font-black font-headline tracking-tighter uppercase text-primary">Published Database</h2>
            <div class="bg-white rounded-[3rem] shadow-2xl border border-gray-100 overflow-hidden overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-primary text-white text-[10px] font-black uppercase tracking-widest">
                        <tr><th class="px-8 py-6">Y-DNA</th><th class="px-6 py-6">Governorate</th><th class="px-6 py-6">Name</th><th class="px-6 py-6 text-center">Kit</th></tr>
                    </thead>
                    <tbody id="database-body" class="text-sm font-bold divide-y divide-gray-50"></tbody>
                </table>
            </div>
        </section>

        <!-- REGIONAL ARCHIVES -->
        <section class="space-y-10">
            <h2 class="text-5xl font-black font-headline tracking-tighter uppercase text-primary">Regional Archives</h2>
            <div id="stats-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8"></div>
        </section>
    </main>

    <script>
        const SB_URL = "https://lsfmpmfoqdtkgndtaxen.supabase.co";
        const SB_KEY = "sb_publishable_dnaPmhIN6Lp4irUSxYuAMQ_vzE_CCKT";
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        const HAPLO_COLORS = { 
            "R1B": "#FF0000", "E": "#00008B", "T": "#FFA500", "J1": "#006400", 
            "L1": "#00FFFF", "B": "#008B8B", "G": "#444444", "G2": "#444444",
            "J2": "#32CD32", "R1A": "#DEB887", "A": "#000", "I2": "#C0C0C0"
        };
        
        const GOV_LIST = ["Ad Daqahlīyah", "Al Fayyūm", "Al Gharbīyah", "Al Iskandarīyah", "Al Ismā`īlīyah", "Al Minūfīyah", "Al Minyā", "Al Qalyūbīyah", "As Suways", "Ash Sharqīyah", "Aswān", "Asyūt", "Banī Suwayf", "Cairo", "Dumyāt", "Giza", "Janūb Sīnā’", "Kafr ash Shaykh", "Luxor", "Matrouh", "Qinā", "Shamal Sīnā’", "Sūhāj", "—"].sort();

        let regionalData = {}; let databaseSamples = []; let charts = {};

        async function init() {
            await loadAllData();
            renderUI();
            renderDatabase();
        }

        async function loadAllData() {
            try {
                const [statsRes, samplesRes] = await Promise.all([
                    _supabase.from('dna_stats').select('*'),
                    _supabase.from('published_samples').select('*')
                ]);
                databaseSamples = samplesRes.data || [];
                regionalData = {}; GOV_LIST.forEach(g => regionalData[g] = {});

                if (statsRes.data) {
                    statsRes.data.forEach(row => {
                        const reg = (row.region === "Unassigned Origin" || !row.region) ? "—" : row.region;
                        if (regionalData[reg]) {
                            let hp = row.haplogroup.toUpperCase().trim();
                            if (hp === "J") hp = "J1";
                            regionalData[reg][hp] = (regionalData[reg][hp] || 0) + parseInt(row.count);
                        }
                    });
                }
            } catch (err) { console.error(err); }
        }

        function createPieChart(canvasId, dataMap, isMini, govName = null) {
            const canvas = document.getElementById(canvasId);
            const ctx = canvas.getContext('2d');
            if (charts[canvasId]) charts[canvasId].destroy();
            
            const labels = Object.keys(dataMap).filter(k => dataMap[k] > 0);
            const values = labels.map(k => dataMap[k]);

            charts[canvasId] = new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: labels,
                    datasets: [{ 
                        data: values, 
                        backgroundColor: labels.map(l => HAPLO_COLORS[l] || "#CCC"),
                        borderWidth: 1, borderColor: '#fff'
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    onClick: (evt, elements) => {
                        if (elements.length > 0 && govName) {
                            const index = elements[0].index;
                            const haplo = labels[index];
                            showHaploDetails(govName, haplo);
                        }
                    }
                }
            });
        }

        function showHaploDetails(gov, haplo) {
            const container = document.getElementById('kits-container');
            const listArea = document.getElementById('modal-kit-list');
            
            // FIX 1: Container leeren, damit alte Linien verschwinden!
            container.innerHTML = '';
            
            document.getElementById('selected-haplo-name').innerText = haplo;

            // FIX 2: Präziser Filter
            const matches = databaseSamples.filter(s => {
                const sGov = s.governorate || "—";
                if (sGov !== gov) return false;

                const fullY = (s.y_dna || "").toUpperCase();
                const legendHaplo = haplo.toUpperCase();

                // Logik: "R1b" in Legende passt auf Kits die mit "R-" starten, "J1" auf "J-", etc.
                const kitPrefix = fullY.split('-')[0].split(' ')[0];
                
                if (legendHaplo === "R1B" || legendHaplo === "R1A") return kitPrefix === "R";
                if (legendHaplo === "J1" || legendHaplo === "J2") return kitPrefix === "J";
                if (legendHaplo === "I2") return kitPrefix === "I";
                
                return kitPrefix === legendHaplo;
            });

            if (matches.length > 0) {
                container.innerHTML = matches.map(s => `
                    <div class="p-6 border border-gray-100 rounded-[2.5rem] bg-white shadow-sm hover:border-secondary transition-all">
                        <div class="flex justify-between items-start mb-3">
                            <span class="px-3 py-1 bg-primary text-white text-[10px] font-black rounded-full">${s.y_dna}</span>
                            <span class="text-[10px] font-mono text-gray-400 font-bold">KIT: ${s.kit_number || '—'}</span>
                        </div>
                        <p class="font-black text-primary uppercase text-sm mb-1 leading-tight">${s.name || 'Anonymous'}</p>
                        <p class="text-[9px] text-gray-400 font-mono truncate mb-4">${s.snp_path || '—'}</p>
                        <div class="flex gap-2">
                            ${s.y_link_1 && s.y_link_1 !== '—' ? `<a href="${s.y_link_1}" target="_blank" class="px-3 py-1 rounded-lg bg-secondary/10 text-secondary text-[9px] font-black hover:bg-secondary hover:text-white transition-colors">YFULL</a>` : ''}
                            ${s.y_link_2 && s.y_link_2 !== '—' ? `<a href="${s.y_link_2}" target="_blank" class="px-3 py-1 rounded-lg bg-secondary/10 text-secondary text-[9px] font-black hover:bg-secondary hover:text-white transition-colors">FTDNA</a>` : ''}
                        </div>
                    </div>`).join('');
            } else {
                container.innerHTML = `<p class="col-span-full text-gray-400 italic font-bold p-8 bg-gray-50 rounded-[2rem] text-center">No detailed kits available for ${haplo} in ${gov}. Only anonymous CSV data.</p>`;
            }
            
            listArea.classList.remove('hidden');
            
            // FIX 3: Sanftes Scrollen zur Liste
            setTimeout(() => {
                listArea.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 50);
        }

        function openModal(gov) {
            const data = regionalData[gov] || {}; 
            const total = Object.values(data).reduce((a, b) => a + b, 0);
            document.getElementById('modal-title').innerText = gov;
            document.getElementById('modal-sample').innerText = `TOTAL: ${total}`;
            document.getElementById('modal-kit-list').classList.add('hidden');
            document.getElementById('detail-modal').classList.add('active');
            
            setTimeout(() => createPieChart('modalChartCanvas', data, false, gov), 50);
            
            const sorted = Object.entries(data).sort((a,b) => b[1] - a[1]);
            document.getElementById('modal-legend').innerHTML = sorted.map(([name, count]) => `
                <div onclick="showHaploDetails('${gov}', '${name}')" class="flex items-center justify-between p-4 bg-gray-50 rounded-2xl cursor-pointer hover:bg-secondary/10 transition-all group">
                    <div class="flex items-center gap-4 font-black">
                        <div class="w-5 h-5 rounded-full shadow-sm" style="background:${HAPLO_COLORS[name] || '#CCC'}"></div>
                        <span class="text-xl uppercase">${name}</span>
                    </div>
                    <span class="text-xl font-black">${((count/total)*100).toFixed(1)}%</span>
                </div>`).join('');
        }

        function renderUI() {
            const grid = document.getElementById('stats-grid'); grid.innerHTML = '';
            GOV_LIST.forEach((gov, idx) => {
                const data = regionalData[gov] || {}; const total = Object.values(data).reduce((a,b)=>a+b, 0);
                const canvasId = `chart-${idx}`;
                const card = document.createElement('div'); card.className = "stat-card"; card.onclick = () => openModal(gov);
                card.innerHTML = `<div class="w-16 h-16 flex-shrink-0"><canvas id="${canvasId}"></canvas></div><div class="min-w-0"><h4 class="font-black text-xs uppercase truncate">${gov}</h4><p class="text-[10px] text-gray-400 font-bold uppercase">Total: ${total}</p></div>`;
                grid.appendChild(card);
                if (total > 0) setTimeout(() => createPieChart(canvasId, data, true), 50);
            });
            updateNationalSummary();
        }

        function updateNationalSummary() {
            const totals = {}; let grandTotal = 0;
            Object.values(regionalData).forEach(reg => {
                Object.entries(reg).forEach(([hp, count]) => {
                    totals[hp] = (totals[hp] || 0) + count; grandTotal += count;
                });
            });
            document.getElementById('total-national-samples').innerText = grandTotal;
            if (grandTotal > 0) createPieChart('nationalChartCanvas', totals, false);
            const sorted = Object.entries(totals).sort((a,b) => b[1]-a[1]).slice(0, 10);
            document.getElementById('national-legend').innerHTML = sorted.map(([name, count]) => `
                <div class="flex items-center justify-between text-[11px] font-black border-b border-gray-50 pb-1 uppercase tracking-tighter">
                    <div class="flex items-center gap-2"><div class="w-2 h-2 rounded-full" style="background: ${HAPLO_COLORS[name] || '#CCC'}"></div><span>${name}</span></div>
                    <span>${((count/grandTotal)*100).toFixed(1)}%</span>
                </div>`).join('');
        }

        function renderDatabase() {
            const tbody = document.getElementById('database-body');
            tbody.innerHTML = databaseSamples.slice(0, 20).map(s => `
                <tr class="hover:bg-gray-50">
                    <td class="px-8 py-5"><span class="px-3 py-1 bg-primary text-white text-[10px] font-black rounded-full">${s.y_dna || '—'}</span></td>
                    <td class="px-6 py-5 uppercase text-[10px] font-bold text-gray-400">${s.governorate || '—'}</td>
                    <td class="px-6 py-5 font-black text-primary">${s.name || 'Anonymous'}</td>
                    <td class="px-6 py-5 text-xs text-gray-400 font-mono text-center">${s.kit_number || '—'}</td>
                </tr>`).join('');
        }

        function closeModal(e) { if (!e || e.target.id === 'detail-modal') document.getElementById('detail-modal').classList.remove('active'); }

        init();
    </script>
</body>
</html>
